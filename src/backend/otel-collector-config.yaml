# ADOT Collector Configuration for ECS Fargate
# This config is used by the ADOT Collector sidecar to receive OTLP data
# and export to AWS X-Ray, CloudWatch Metrics, and CloudWatch Logs.
#
# Environment variables (set by ECS task definition):
#   - AWS_REGION: AWS region for exporters
#   - ENVIRONMENT: Deployment environment (dev, staging, prod)
#   - OTEL_SERVICE_NAME: Service name for log stream naming

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Batch processor for efficient export
  batch:
    timeout: 10s
    send_batch_size: 1024
    send_batch_max_size: 2048

  # Resource detection for ECS metadata
  resourcedetection:
    detectors:
      - env
      - ecs
      - ec2
    timeout: 5s
    override: false

exporters:
  # AWS X-Ray for distributed tracing
  awsxray:
    region: ${env:AWS_REGION}
    indexed_attributes:
      - "http.method"
      - "http.route"
      - "http.status_code"
      - "db.system"
      - "db.operation"
      - "bedrock.model"

  # AWS CloudWatch EMF for metrics
  awsemf:
    region: ${env:AWS_REGION}
    namespace: AIT/Backend
    log_group_name: /ait/${env:ENVIRONMENT}/backend/metrics
    log_stream_name: otel-metrics
    dimension_rollup_option: NoDimensionRollup
    resource_to_telemetry_conversion:
      enabled: true
    metric_declarations:
      # HTTP metrics
      - dimensions:
          - - service.name
            - http.method
            - http.route
            - http.status_code
        metric_name_selectors:
          - "http.server.request.duration"
          - "http.server.requests.total"
          - "http.server.errors.total"
          - "http.server.active_connections"
      # Bedrock/LLM metrics
      - dimensions:
          - - service.name
            - bedrock.model
        metric_name_selectors:
          - "bedrock.*"
      # Database metrics
      - dimensions:
          - - service.name
            - db.system
        metric_name_selectors:
          - "db.*"
      # Assistant metrics
      - dimensions:
          - - service.name
        metric_name_selectors:
          - "assistant.*"

  # AWS CloudWatch Logs for application logs
  awscloudwatchlogs:
    region: ${env:AWS_REGION}
    log_group_name: /ait/${env:ENVIRONMENT}/backend/otel-logs
    log_stream_name: ${env:OTEL_SERVICE_NAME}
    log_retention: 30

  # Debug exporter for troubleshooting (optional, low verbosity)
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions:
    - health_check

  pipelines:
    # Traces pipeline -> AWS X-Ray
    traces:
      receivers:
        - otlp
      processors:
        - resourcedetection
        - batch
      exporters:
        - awsxray

    # Metrics pipeline -> CloudWatch EMF
    metrics:
      receivers:
        - otlp
      processors:
        - resourcedetection
        - batch
      exporters:
        - awsemf

    # Logs pipeline -> CloudWatch Logs
    logs:
      receivers:
        - otlp
      processors:
        - resourcedetection
        - batch
      exporters:
        - awscloudwatchlogs

  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
