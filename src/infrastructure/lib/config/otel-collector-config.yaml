# ADOT Collector Configuration for ECS Fargate
# This config is used by the ADOT Collector sidecar to receive OTLP data
# and export to AWS X-Ray, CloudWatch Metrics, and CloudWatch Logs.
#
# Environment variables (set by ECS task definition):
#   - AWS_REGION: AWS region for exporters
#   - ENVIRONMENT: Deployment environment (dev, staging, prod)
#   - OTEL_SERVICE_NAME: Service name for log stream naming

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Batch processor for efficient export
  batch:
    timeout: 10s
    send_batch_size: 1024
    send_batch_max_size: 2048

  # Resource detection for ECS metadata (no ec2 detector - not available in Fargate)
  resourcedetection:
    detectors:
      - env
      - ecs
    timeout: 5s
    override: false

exporters:
  # AWS X-Ray for distributed tracing
  awsxray:
    region: ${env:AWS_REGION}
    indexed_attributes:
      - "http.method"
      - "http.route"
      - "http.status_code"
      - "db.system"
      - "db.operation"
      - "bedrock.model"

  # AWS CloudWatch EMF for metrics
  awsemf:
    region: ${env:AWS_REGION}
    namespace: AIT/Backend
    log_group_name: /ait/${env:ENVIRONMENT}/backend/metrics
    log_stream_name: otel-metrics
    output_destination: cloudwatch
    dimension_rollup_option: NoDimensionRollup
    resource_to_telemetry_conversion:
      enabled: true
    metric_declarations:
      # HTTP metrics - use regex to match histogram variants
      - dimensions:
          - - service.name
          - - service.name
            - method
          - - service.name
            - method
            - route
            - status_code
        metric_name_selectors:
          - "^http\\.server\\..*"
      # Database metrics - use regex to match all db.* metrics
      - dimensions:
          - - service.name
          - - service.name
            - db.system
          - - service.name
            - db.system
            - db.operation.name
        metric_name_selectors:
          - "^db\\..*"
      # Bedrock/LLM metrics
      - dimensions:
          - - service.name
          - - service.name
            - bedrock.model
        metric_name_selectors:
          - "^bedrock\\..*"
      # Assistant metrics
      - dimensions:
          - - service.name
        metric_name_selectors:
          - "^assistant\\..*"

  # AWS CloudWatch Logs for application logs
  awscloudwatchlogs:
    region: ${env:AWS_REGION}
    log_group_name: /ait/${env:ENVIRONMENT}/backend/otel-logs
    log_stream_name: ${env:OTEL_SERVICE_NAME}
    log_retention: 30

  # Logging exporter for troubleshooting (ADOT uses 'logging' instead of 'debug')
  logging:
    verbosity: detailed
    sampling_initial: 10
    sampling_thereafter: 100

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions:
    - health_check

  pipelines:
    # Traces pipeline -> AWS X-Ray
    traces:
      receivers:
        - otlp
      processors:
        - resourcedetection
        - batch
      exporters:
        - awsxray

    # Metrics pipeline -> CloudWatch EMF
    metrics:
      receivers:
        - otlp
      processors:
        - resourcedetection
        - batch
      exporters:
        - awsemf

    # Logs pipeline -> CloudWatch Logs
    logs:
      receivers:
        - otlp
      processors:
        - resourcedetection
        - batch
      exporters:
        - awscloudwatchlogs

  telemetry:
    logs:
      level: warn
