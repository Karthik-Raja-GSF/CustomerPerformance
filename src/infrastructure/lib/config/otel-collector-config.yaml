# OpenTelemetry Collector Contrib Configuration for ECS Fargate
# This config is used by the OTEL Collector Contrib sidecar to receive OTLP data
# and export to AWS X-Ray, CloudWatch Metrics, and CloudWatch Logs.
#
# Uses OTEL Collector Contrib (otel/opentelemetry-collector-contrib) for
# transform processor support - enabling CloudWatch-friendly flattened logs.
#
# Traces and logs are exported via AWS native OTLP endpoints:
#   - Traces: https://xray.{region}.amazonaws.com/v1/traces
#   - Logs: https://logs.{region}.amazonaws.com/v1/logs
#
# Environment variables (set by ECS task definition):
#   - AWS_REGION: AWS region for exporters
#   - ENVIRONMENT: Deployment environment (dev, staging, prod)
#   - OTEL_SERVICE_NAME: Service name for log stream naming

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Batch processor for efficient export
  batch:
    timeout: 10s
    send_batch_size: 1024
    send_batch_max_size: 2048

  # Resource detection for ECS metadata (no ec2 detector - not available in Fargate)
  resourcedetection:
    detectors:
      - env
      - ecs
    timeout: 5s
    override: false

  # Transform processor - add level and message fields to attributes
  # These fields are preserved when logs are sent to CloudWatch via native OTLP endpoint
  transform/logs:
    log_statements:
      - context: log
        statements:
          # Add level from severity_text for standard log level filtering
          - set(attributes["level"], severity_text) where severity_text != ""
          # Copy body (message string) to attributes for easier querying
          - set(attributes["message"], body) where body != nil
          # Flatten any nested maps within attributes
          - flatten(attributes, "")

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

  # SigV4 authentication for CloudWatch Logs OTLP endpoint
  sigv4auth/logs:
    region: ${env:AWS_REGION}
    service: "logs"

  # SigV4 authentication for X-Ray OTLP endpoint
  sigv4auth/xray:
    region: ${env:AWS_REGION}
    service: "xray"

exporters:
  # AWS X-Ray for distributed tracing via native OTLP endpoint
  otlphttp/xray:
    compression: gzip
    traces_endpoint: https://xray.${env:AWS_REGION}.amazonaws.com/v1/traces
    auth:
      authenticator: sigv4auth/xray

  # AWS CloudWatch EMF for metrics
  awsemf:
    region: ${env:AWS_REGION}
    namespace: AIT/Backend
    log_group_name: /ait/${env:ENVIRONMENT}/backend/metrics
    log_stream_name: otel-metrics
    output_destination: cloudwatch
    dimension_rollup_option: NoDimensionRollup
    resource_to_telemetry_conversion:
      enabled: true
    metric_declarations:
      # HTTP metrics - aggregate only (removed route/status_code for cost optimization)
      - dimensions:
          - - service.name
          - - service.name
            - method
        metric_name_selectors:
          - "^http\\.server\\..*"
      # Database metrics - aggregate only (removed db.operation.name for cost optimization)
      - dimensions:
          - - service.name
          - - service.name
            - db.system
        metric_name_selectors:
          - "^db\\..*"
      # Bedrock/LLM metrics - keep model dimension (low cardinality)
      - dimensions:
          - - service.name
          - - service.name
            - bedrock.model
        metric_name_selectors:
          - "^bedrock\\..*"
      # Assistant metrics - unchanged
      - dimensions:
          - - service.name
        metric_name_selectors:
          - "^assistant\\..*"

  # CloudWatch Logs via native OTLP endpoint
  # Uses AWS SigV4 authentication and sends logs in OTLP format
  # CloudWatch handles the log formatting natively
  otlphttp/cloudwatch-logs:
    compression: gzip
    logs_endpoint: https://logs.${env:AWS_REGION}.amazonaws.com/v1/logs
    headers:
      x-aws-log-group: /ait/${env:ENVIRONMENT}/backend/otel-logs
      x-aws-log-stream: ${env:OTEL_SERVICE_NAME}
    auth:
      authenticator: sigv4auth/logs

  # Debug exporter for troubleshooting (standard OTEL Contrib naming)
  debug:
    verbosity: detailed
    sampling_initial: 10
    sampling_thereafter: 100

service:
  extensions:
    - health_check
    - sigv4auth/logs
    - sigv4auth/xray

  pipelines:
    # Traces pipeline -> AWS X-Ray via native OTLP endpoint
    traces:
      receivers:
        - otlp
      processors:
        - resourcedetection
        - batch
      exporters:
        - otlphttp/xray

    # Metrics pipeline -> CloudWatch EMF
    metrics:
      receivers:
        - otlp
      processors:
        - resourcedetection
        - batch
      exporters:
        - awsemf

    # Logs pipeline -> CloudWatch Logs via native OTLP endpoint
    # Uses transform/logs processor to add level and message attributes
    logs:
      receivers:
        - otlp
      processors:
        - resourcedetection
        - transform/logs
        - batch
      exporters:
        - otlphttp/cloudwatch-logs

  telemetry:
    logs:
      level: warn
