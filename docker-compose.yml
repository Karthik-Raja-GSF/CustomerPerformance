services:
  # MS SQL Server (for restoring NAV .bak files)
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: P@ssword#123
    ports:
      - "1433:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "P@ssword#123" -C -Q "SELECT 1" || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: admin-blueprint-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: admin_blueprint
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # DISABLED - Use adot_collector for local OTEL testing
  # aspire_dashboard:
  #   image: mcr.microsoft.com/dotnet/aspire-dashboard:9.3
  #   restart: always
  #   ports:
  #     - 18888:18888
  #     - 4317:18889
  #   environment:
  #     - Dashboard:ApplicationName=GSF
  #     - Dashboard:Frontend:BrowserToken=password

  # ADOT Collector for local telemetry testing
  adot_collector:
    image: public.ecr.aws/aws-observability/aws-otel-collector:latest
    container_name: adot-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./src/infrastructure/lib/config/otel-collector-config.local.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "13133:13133" # Health check

volumes:
  postgres_data:
    driver: local
  mssql_data:
    driver: local
