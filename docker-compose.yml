services:
  # MS SQL Server (for restoring NAV .bak files)
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: P@ssword#123
    ports:
      - "1433:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "P@ssword#123" -C -Q "SELECT 1" || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: admin-blueprint-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: admin_blueprint
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aspire Dashboard - alternative OTEL viewer (enable via profile)
  # UI: http://localhost:20000 | OTLP endpoint: localhost:20001
  aspire_dashboard:
    profiles: [aspire]
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.3
    restart: unless-stopped
    ports:
      - "20000:18888" # Dashboard UI
      - "20001:18889" # OTLP receiver (avoids conflict with otel_collector's 4317)
    environment:
      - Dashboard__ApplicationName=GSF
      - Dashboard__Frontend__BrowserToken=password

  # OTEL Collector Contrib for local telemetry testing
  # Uses Contrib for transform processor support (flattens logs for CloudWatch queries)
  # otel_collector:
  #   image: otel/opentelemetry-collector-contrib:0.140.0
  #   container_name: otel-collector
  #   restart: unless-stopped
  #   command: ["--config=/etc/otel-collector-config.yaml"]
  #   volumes:
  #     - ./src/infrastructure/lib/config/otel-collector-config.local.yaml:/etc/otel-collector-config.yaml:ro
  #   ports:
  #     - "4317:4317" # OTLP gRPC
  #     - "4318:4318" # OTLP HTTP
  #     - "13133:13133" # Health check

  # Frontend (nginx serving built React SPA)
  # Only starts with: docker compose --profile frontend up
  frontend:
    profiles: [frontend]
    build:
      context: .
      dockerfile: src/webapp/Dockerfile
      args:
        VITE_COGNITO_USER_POOL_ID: ${VITE_COGNITO_USER_POOL_ID:-us-east-1_hO4sbrlVw}
        VITE_COGNITO_CLIENT_ID: ${VITE_COGNITO_CLIENT_ID:-6divm16kgf3lljacicn0cjl0pn}
        VITE_COGNITO_REGION: ${VITE_COGNITO_REGION:-us-east-1}
        VITE_COGNITO_DOMAIN: ${VITE_COGNITO_DOMAIN:-ait-dev.auth.us-east-1.amazoncognito.com}
        VITE_COGNITO_AZURE_AD_IDP_NAME: ${VITE_COGNITO_AZURE_AD_IDP_NAME:-ait-dev-gbl-cog-idp-ad-01}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL_ECS:-http://localhost:8887/api}
    ports:
      - "3030:80"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:80/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  mssql_data:
    driver: local
