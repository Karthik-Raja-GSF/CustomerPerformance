name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "src/webapp/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-webapp.yml"

concurrency:
  group: webapp-deploy-${{ github.sha }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  AWS_REGION: us-east-1

jobs:
  setup-dev:
    name: Setup Dev Resources
    runs-on: ubuntu-latest
    outputs:
      s3_bucket: ${{ steps.set-resources.outputs.s3_bucket }}
      cloudfront_id: ${{ steps.set-resources.outputs.cloudfront_id }}
      frontend_url: ${{ steps.set-resources.outputs.frontend_url }}

    steps:
      - name: Set dev resources
        id: set-resources
        run: |
          echo "s3_bucket=${{ secrets.S3_BUCKET }}" >> $GITHUB_OUTPUT
          echo "cloudfront_id=${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" >> $GITHUB_OUTPUT
          echo "frontend_url=https://ait-dev.tratin.com" >> $GITHUB_OUTPUT
          echo "✅ Dev resources configured"

  build-dev:
    name: Build Frontend (Dev)
    needs: setup-dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter webapp typecheck

      - name: Build webapp (Dev)
        run: pnpm --filter webapp build
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ vars.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_REGION: ${{ vars.VITE_COGNITO_REGION }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-dist-dev
          path: src/webapp/dist
          retention-days: 2

  deploy-dev:
    name: Deploy to Dev
    needs: [setup-dev, build-dev]
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-dist-dev
          path: dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        env:
          S3_BUCKET: ${{ needs.setup-dev.outputs.s3_bucket }}
        run: |
          echo "Deploying to S3 bucket: $S3_BUCKET"

          # Sync static assets with aggressive caching (1 year)
          aws s3 sync dist/ s3://$S3_BUCKET \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.json"

          # Upload index.html with no-cache (always fetch latest)
          aws s3 cp dist/index.html s3://$S3_BUCKET/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

          # Upload any JSON files with no-cache (if they exist)
          if ls dist/*.json 1> /dev/null 2>&1; then
            aws s3 sync dist/ s3://$S3_BUCKET \
              --exclude "*" \
              --include "*.json" \
              --cache-control "no-cache, no-store, must-revalidate"
          fi

          echo "✅ S3 sync complete"

      - name: Invalidate CloudFront cache
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ needs.setup-dev.outputs.cloudfront_id }}
        run: |
          echo "Invalidating CloudFront cache for distribution: $CLOUDFRONT_DISTRIBUTION_ID"

          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text

          echo "✅ CloudFront cache invalidation initiated"

      - name: Verify frontend health
        env:
          FRONTEND_URL: ${{ needs.setup-dev.outputs.frontend_url }}
        run: |
          echo "Verifying frontend is accessible at $FRONTEND_URL..."

          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" $FRONTEND_URL || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Frontend health check passed (HTTP $HTTP_CODE)"
              exit 0
            fi

            echo "⏳ Health check attempt $i/10 failed (HTTP $HTTP_CODE), retrying..."
            sleep 6
          done

          echo "❌ Frontend health check failed after 10 attempts"
          exit 1

  approval-gate:
    name: Approve Production Deployment
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: approval

    steps:
      - name: Production deployment approved
        run: |
          echo "## Production Deployment Approved ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Dev deployment successful. Proceeding with prod build and deployment..." >> $GITHUB_STEP_SUMMARY

  setup-prod:
    name: Setup Prod Resources
    needs: approval-gate
    runs-on: ubuntu-latest
    outputs:
      s3_bucket: ${{ steps.set-resources.outputs.s3_bucket }}
      cloudfront_id: ${{ steps.set-resources.outputs.cloudfront_id }}
      frontend_url: ${{ steps.set-resources.outputs.frontend_url }}

    steps:
      - name: Set prod resources
        id: set-resources
        run: |
          echo "s3_bucket=${{ secrets.S3_BUCKET_PROD }}" >> $GITHUB_OUTPUT
          echo "cloudfront_id=${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_PROD }}" >> $GITHUB_OUTPUT
          echo "frontend_url=https://ait.tratin.com" >> $GITHUB_OUTPUT
          echo "✅ Prod resources configured"

  build-prod:
    name: Build Frontend (Prod)
    needs: setup-prod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter webapp typecheck

      - name: Build webapp (Prod)
        run: pnpm --filter webapp build
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ vars.VITE_COGNITO_USER_POOL_ID_PROD }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID_PROD }}
          VITE_COGNITO_REGION: ${{ vars.VITE_COGNITO_REGION_PROD }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL_PROD }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-dist-prod
          path: src/webapp/dist
          retention-days: 7

  deploy-prod:
    name: Deploy to Prod
    needs: [setup-prod, build-prod]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-dist-prod
          path: dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        env:
          S3_BUCKET: ${{ needs.setup-prod.outputs.s3_bucket }}
        run: |
          echo "Deploying to S3 bucket: $S3_BUCKET"

          # Sync static assets with aggressive caching (1 year)
          aws s3 sync dist/ s3://$S3_BUCKET \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.json"

          # Upload index.html with no-cache (always fetch latest)
          aws s3 cp dist/index.html s3://$S3_BUCKET/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

          # Upload any JSON files with no-cache (if they exist)
          if ls dist/*.json 1> /dev/null 2>&1; then
            aws s3 sync dist/ s3://$S3_BUCKET \
              --exclude "*" \
              --include "*.json" \
              --cache-control "no-cache, no-store, must-revalidate"
          fi

          echo "✅ S3 sync complete"

      - name: Invalidate CloudFront cache
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ needs.setup-prod.outputs.cloudfront_id }}
        run: |
          echo "Invalidating CloudFront cache for distribution: $CLOUDFRONT_DISTRIBUTION_ID"

          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)

          echo "Invalidation ID: $INVALIDATION_ID"

          echo "Waiting for cache invalidation to complete..."
          aws cloudfront wait invalidation-completed \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --id $INVALIDATION_ID \
            --cli-read-timeout 300 || echo "⚠️ Invalidation still in progress"

          echo "✅ CloudFront cache invalidation complete"

      - name: Verify frontend health
        env:
          FRONTEND_URL: ${{ needs.setup-prod.outputs.frontend_url }}
        run: |
          echo "Verifying frontend is accessible at $FRONTEND_URL..."

          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" $FRONTEND_URL || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Frontend health check passed (HTTP $HTTP_CODE)"
              exit 0
            fi

            echo "⏳ Health check attempt $i/10 failed (HTTP $HTTP_CODE), retrying..."
            sleep 6
          done

          echo "❌ Frontend health check failed after 10 attempts"
          exit 1

      - name: Deployment summary
        if: success()
        env:
          FRONTEND_URL: ${{ needs.setup-prod.outputs.frontend_url }}
        run: |
          echo "## Deployment Complete! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** production" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** $FRONTEND_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ S3 sync complete" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ CloudFront cache invalidated" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Frontend health check passed" >> $GITHUB_STEP_SUMMARY
