name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "src/webapp/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-webapp.yml"

concurrency:
  group: webapp-deploy-${{ github.sha }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  AWS_REGION: us-east-1

jobs:
  build-dev:
    name: Build Frontend (Dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter webapp typecheck

      - name: Build webapp (Dev)
        run: pnpm --filter webapp build
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ vars.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_REGION: ${{ vars.VITE_COGNITO_REGION }}
          VITE_COGNITO_DOMAIN: ${{ vars.VITE_COGNITO_DOMAIN }}
          VITE_COGNITO_AZURE_AD_IDP_NAME: ${{ vars.VITE_COGNITO_AZURE_AD_IDP_NAME }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-dist-dev
          path: src/webapp/dist
          retention-days: 2

  deploy-dev:
    name: Deploy to Dev
    needs: build-dev
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-dist-dev
          path: dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          echo "Deploying to S3 bucket: ${{ secrets.S3_BUCKET }}"

          # Sync static assets with aggressive caching (1 year)
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.json"

          # Upload index.html with no-cache (always fetch latest)
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

          # Upload any JSON files with no-cache (if they exist)
          if ls dist/*.json 1> /dev/null 2>&1; then
            aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }} \
              --exclude "*" \
              --include "*.json" \
              --cache-control "no-cache, no-store, must-revalidate"
          fi

          echo "✅ S3 sync complete"

      - name: Invalidate CloudFront cache
        run: |
          echo "Invalidating CloudFront cache for distribution: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"

          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text

          echo "✅ CloudFront cache invalidation initiated"

      - name: Verify frontend health
        run: |
          FRONTEND_URL="https://ait-dev.tratin.com"
          echo "Verifying frontend is accessible at $FRONTEND_URL..."

          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" $FRONTEND_URL || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Frontend health check passed (HTTP $HTTP_CODE)"
              exit 0
            fi

            echo "⏳ Health check attempt $i/10 failed (HTTP $HTTP_CODE), retrying..."
            sleep 6
          done

          echo "❌ Frontend health check failed after 10 attempts"
          exit 1

