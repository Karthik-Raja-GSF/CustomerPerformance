name: Deploy Frontend to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v1.0.0 - should match backend version)"
        required: true
        type: string

concurrency:
  group: webapp-prod
  cancel-in-progress: false # Never cancel prod deployments

env:
  NODE_VERSION: "20"
  AWS_REGION: us-east-1

jobs:
  validate:
    name: Validate Version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history to check tags

      - name: Validate version tag exists
        run: |
          VERSION="${{ github.event.inputs.version }}"

          # Validate semantic version format
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: $VERSION"
            echo "Expected format: v1.0.0"
            exit 1
          fi

          # Check if tag exists (should be created by backend workflow)
          if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "❌ Tag $VERSION does not exist"
            echo "Please deploy the backend first to create the tag"
            exit 1
          fi

          echo "✅ Tag $VERSION exists and is valid"

  build:
    name: Build Frontend
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter webapp typecheck

      - name: Build webapp for production
        run: pnpm --filter webapp build
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ vars.VITE_COGNITO_USER_POOL_ID_PROD }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID_PROD }}
          VITE_COGNITO_REGION: ${{ vars.VITE_COGNITO_REGION_PROD }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL_PROD }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-dist-prod
          path: src/webapp/dist
          retention-days: 7 # Keep prod builds for 7 days

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: production # Manual approval required

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-dist-prod
          path: dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET_PROD }}
        run: |
          echo "Deploying to production S3 bucket: $S3_BUCKET"

          # Sync static assets with aggressive caching (1 year)
          aws s3 sync dist/ s3://$S3_BUCKET \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.json"

          # Upload index.html with no-cache (always fetch latest)
          aws s3 cp dist/index.html s3://$S3_BUCKET/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

          # Upload any JSON files with no-cache (if they exist)
          if ls dist/*.json 1> /dev/null 2>&1; then
            aws s3 sync dist/ s3://$S3_BUCKET \
              --exclude "*" \
              --include "*.json" \
              --cache-control "no-cache, no-store, must-revalidate"
          fi

          echo "✅ S3 sync complete"

      - name: Invalidate CloudFront cache
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_PROD }}
        run: |
          echo "Invalidating CloudFront cache for distribution: $CLOUDFRONT_DISTRIBUTION_ID"

          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)

          echo "Invalidation ID: $INVALIDATION_ID"

          # Wait for invalidation to complete (max 5 minutes)
          echo "Waiting for cache invalidation to complete..."
          aws cloudfront wait invalidation-completed \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --id $INVALIDATION_ID \
            --cli-read-timeout 300 || echo "⚠️ Invalidation still in progress"

          echo "✅ CloudFront cache invalidation initiated"

      - name: Verify frontend health
        run: |
          echo "Verifying frontend is accessible..."

          # Wait for CloudFront to serve new content (retry 10 times with 6 second intervals)
          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://ait.tratin.com || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Frontend health check passed (HTTP $HTTP_CODE)"
              exit 0
            fi

            echo "⏳ Health check attempt $i/10 failed (HTTP $HTTP_CODE), retrying..."
            sleep 6
          done

          echo "❌ Frontend health check failed after 10 attempts"
          exit 1

      - name: Deployment summary
        if: success()
        run: |
          echo "## Production Frontend Deployment Complete! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ github.event.inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://ait.tratin.com" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ S3 sync complete" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ CloudFront cache invalidated" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Frontend health check passed" >> $GITHUB_STEP_SUMMARY
