name: Deploy Backend to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v1.0.0)"
        required: true
        type: string
      release_notes:
        description: "Release notes (optional)"
        required: false
        type: string

concurrency:
  group: backend-prod
  cancel-in-progress: false # Never cancel prod deployments

env:
  NODE_VERSION: "20"
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ait-prd-gbl-ecr-backend-01
  ECS_CLUSTER: ait-prd-ue1-ecs-cluster-01
  ECS_SERVICE: ait-prd-ue1-ecs-backend-01

jobs:
  create-tag:
    name: Create Git Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for tag creation

      - name: Validate version format
        id: validate
        run: |
          VERSION="${{ github.event.inputs.version }}"

          # Validate semantic version format (v1.0.0)
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: $VERSION"
            echo "Expected format: v1.0.0"
            exit 1
          fi

          # Check if tag already exists
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "✅ Tag $VERSION already exists, skipping creation"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create annotated tag
        run: |
          VERSION="${{ steps.validate.outputs.version }}"
          RELEASE_NOTES="${{ github.event.inputs.release_notes }}"

          # Skip if tag already exists
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag already exists, skipping"
            exit 0
          fi

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create annotated tag with release notes
          if [ -z "$RELEASE_NOTES" ]; then
            git tag -a "$VERSION" -m "Release $VERSION"
          else
            git tag -a "$VERSION" -m "Release $VERSION" -m "$RELEASE_NOTES"
          fi

          # Push tag
          git push origin "$VERSION"

          echo "✅ Created and pushed tag: $VERSION"

  validate:
    name: Validate & Typecheck
    needs: create-tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter backend prisma:generate

      - name: Typecheck
        run: pnpm --filter backend typecheck

      - name: Validate migrations
        run: |
          # Check if migrations directory exists and has files
          if [ ! -d "src/backend/prisma/migrations" ]; then
            echo "⚠️ Warning: No migrations directory found"
            exit 0
          fi

          MIGRATION_COUNT=$(find src/backend/prisma/migrations -name "migration.sql" | wc -l)
          echo "✅ Found $MIGRATION_COUNT migrations"

  build-push:
    name: Build & Push to ECR
    needs: [create-tag, validate]
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ github.sha }}
      version_tag: ${{ needs.create-tag.outputs.version }}

    steps:
      - name: Checkout code at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.version }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          VERSION_TAG: ${{ needs.create-tag.outputs.version }}
        run: |
          echo "Building Docker image for production..."

          # Build Docker image from project root (Dockerfile expects this context)
          docker build --platform linux/amd64 \
            -f src/backend/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .

          # Push all tags
          echo "Pushing image with tags: $IMAGE_TAG, $VERSION_TAG, latest"
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy:
    name: Deploy to Production
    needs: [create-tag, build-push]
    runs-on: ubuntu-latest
    environment: production # Manual approval required

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get current task definition
        id: current-task
        run: |
          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --query 'services[0].taskDefinition' \
            --output text)

          echo "current_task_arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT
          echo "Current task definition: $TASK_DEF_ARN"

      - name: Run database migrations
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
        run: |
          echo "Running database migrations..."

          # Get ECR registry
          ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID_PROD }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          # Get task definition
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${{ steps.current-task.outputs.current_task_arn }} \
            --query 'taskDefinition' \
            --output json)

          # Extract network configuration
          SUBNETS=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.subnets' \
            --output json)

          SECURITY_GROUPS=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.securityGroups' \
            --output json)

          # Run migration task with override command
          TASK_ARN=$(aws ecs run-task \
            --cluster $ECS_CLUSTER \
            --task-definition ${{ steps.current-task.outputs.current_task_arn }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=$SUBNETS,securityGroups=$SECURITY_GROUPS,assignPublicIp=DISABLED}" \
            --overrides '{
              "containerOverrides": [
                {
                  "name": "ait-prd-ue1-ecs-container-01",
                  "command": ["sh", "-c", "export DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT:-5432}/${DB_NAME:-ait_procurement} && npx prisma migrate deploy"]
                }
              ]
            }' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task ARN: $TASK_ARN"

          # Wait for migration task to complete
          echo "Waiting for migrations to complete..."
          aws ecs wait tasks-stopped --cluster $ECS_CLUSTER --tasks $TASK_ARN

          # Check exit code
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster $ECS_CLUSTER \
            --tasks $TASK_ARN \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "❌ Migration failed with exit code: $EXIT_CODE"
            exit 1
          fi

          echo "✅ Migrations completed successfully"

      - name: Deploy to ECS
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
        run: |
          echo "Deploying to ECS with image tag: $IMAGE_TAG"

          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --no-cli-pager

      - name: Wait for deployment stability
        run: |
          echo "Waiting for ECS service to stabilize (max 10 minutes)..."

          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --cli-read-timeout 600

      - name: Verify health check
        run: |
          echo "Verifying backend health..."

          # Get ALB DNS name from ECS service
          ALB_ARN=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --query 'services[0].loadBalancers[0].targetGroupArn' \
            --output text | sed 's/targetgroup/loadbalancer/' | sed 's/\/[^\/]*$//')

          # Wait for health check (retry 10 times with 6 second intervals = 1 minute)
          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://ait-be.tratin.com/health || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed (HTTP $HTTP_CODE)"
              exit 0
            fi

            echo "⏳ Health check attempt $i/10 failed (HTTP $HTTP_CODE), retrying..."
            sleep 6
          done

          echo "❌ Health check failed after 10 attempts"
          exit 1

      - name: Monitor CloudWatch alarms
        run: |
          echo "Checking CloudWatch alarms for 5 minutes..."

          # List alarms with prefix
          ALARM_NAMES=$(aws cloudwatch describe-alarms \
            --alarm-name-prefix "ait-prd-ue1-cw-alarm" \
            --query 'MetricAlarms[].AlarmName' \
            --output text)

          if [ -z "$ALARM_NAMES" ]; then
            echo "⚠️ No CloudWatch alarms found"
            exit 0
          fi

          echo "Monitoring alarms: $ALARM_NAMES"

          # Check alarm state every 30 seconds for 5 minutes
          for i in {1..10}; do
            ALARM_STATES=$(aws cloudwatch describe-alarms \
              --alarm-names $ALARM_NAMES \
              --query 'MetricAlarms[?StateValue==`ALARM`].AlarmName' \
              --output text)

            if [ -n "$ALARM_STATES" ]; then
              echo "❌ Alarms in ALARM state: $ALARM_STATES"
              exit 1
            fi

            echo "✅ All alarms OK (check $i/10)"
            sleep 30
          done

          echo "✅ CloudWatch monitoring complete - no alarms triggered"

      - name: Deployment summary
        if: success()
        run: |
          echo "## Production Deployment Complete! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.create-tag.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://ait-be.tratin.com" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** ${{ needs.build-push.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Health Check" >> $GITHUB_STEP_SUMMARY
          echo "✅ Backend is healthy and responding" >> $GITHUB_STEP_SUMMARY

  rollback:
    name: Rollback on Failure
    needs: [deploy]
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rollback to previous task definition
        run: |
          echo "⚠️ Deployment failed, initiating rollback..."

          # Get previous task definition (2nd most recent)
          PREVIOUS_TASK_DEF=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --query 'services[0].deployments[1].taskDefinition' \
            --output text || echo "none")

          if [ "$PREVIOUS_TASK_DEF" = "none" ] || [ -z "$PREVIOUS_TASK_DEF" ]; then
            echo "❌ No previous task definition found for rollback"
            exit 1
          fi

          echo "Rolling back to: $PREVIOUS_TASK_DEF"

          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition $PREVIOUS_TASK_DEF \
            --force-new-deployment \
            --no-cli-pager

          # Wait for rollback to complete
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE

          echo "✅ Rollback complete"

      - name: Create rollback incident issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Production Deployment Failed - Rollback Initiated`,
              body: `## Deployment Failure\n\n**Version:** ${{ needs.create-tag.outputs.version }}\n**Workflow:** [${context.workflow}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n**Time:** ${new Date().toISOString()}\n\n### Action Required\n- Investigate deployment logs\n- Fix underlying issue\n- Re-run deployment when ready\n\n### Rollback Status\nAutomatic rollback to previous task definition has been initiated.`,
              labels: ['deployment', 'production', 'incident']
            });

            console.log(`Created incident issue: ${issue.data.html_url}`);
