name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "src/backend/**"
      - ".github/workflows/deploy-backend.yml"

concurrency:
  group: backend-deploy-${{ github.sha }}
  cancel-in-progress: false # Never cancel to avoid orphaned artifacts

env:
  NODE_VERSION: "20"
  AWS_REGION: us-east-1

jobs:
  setup:
    name: Setup Resource Names
    runs-on: ubuntu-latest
    outputs:
      dev_ecr_repository: ${{ steps.set-resources.outputs.dev_ecr_repository }}
      dev_ecs_cluster: ${{ steps.set-resources.outputs.dev_ecs_cluster }}
      dev_ecs_service: ${{ steps.set-resources.outputs.dev_ecs_service }}
      prod_ecr_repository: ${{ steps.set-resources.outputs.prod_ecr_repository }}
      prod_ecs_cluster: ${{ steps.set-resources.outputs.prod_ecs_cluster }}
      prod_ecs_service: ${{ steps.set-resources.outputs.prod_ecs_service }}

    steps:
      - name: Set resource names
        id: set-resources
        run: |
          # Dev resources
          echo "dev_ecr_repository=ait-dev-gbl-ecr-backend-01" >> $GITHUB_OUTPUT
          echo "dev_ecs_cluster=ait-dev-ue1-ecs-cluster-01" >> $GITHUB_OUTPUT
          echo "dev_ecs_service=ait-dev-ue1-ecs-backend-01" >> $GITHUB_OUTPUT

          # Prod resources
          echo "prod_ecr_repository=ait-prd-gbl-ecr-backend-01" >> $GITHUB_OUTPUT
          echo "prod_ecs_cluster=ait-prd-ue1-ecs-cluster-01" >> $GITHUB_OUTPUT
          echo "prod_ecs_service=ait-prd-ue1-ecs-backend-01" >> $GITHUB_OUTPUT

          echo "✅ Resource names configured"

  validate:
    name: Validate & Typecheck
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter backend prisma:generate

      - name: Typecheck
        run: pnpm --filter backend typecheck

  build-and-save-artifact:
    name: Build, Save Artifact & Push to Dev ECR
    needs: [setup, validate]
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Building Docker image..."

          docker build --platform linux/amd64 \
            -f src/backend/Dockerfile \
            -t backend-image:$IMAGE_TAG \
            .

          echo "✅ Image built: backend-image:$IMAGE_TAG"

      - name: Save Docker image to artifact
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Saving image to tar.gz..."
          docker save backend-image:$IMAGE_TAG | gzip > backend-image.tar.gz

          SIZE=$(ls -lh backend-image.tar.gz | awk '{print $5}')
          echo "✅ Image saved: backend-image.tar.gz (size: $SIZE)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image-${{ github.sha }}
          path: backend-image.tar.gz
          retention-days: 7
          compression-level: 0

      - name: Load image from artifact
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Loading image for dev deployment..."
          gunzip < backend-image.tar.gz | docker load
          docker image inspect backend-image:$IMAGE_TAG

      - name: Configure AWS credentials (dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push to dev ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ needs.setup.outputs.dev_ecr_repository }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Tagging image for dev ECR..."
          docker tag backend-image:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag backend-image:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "Pushing image with tags: $IMAGE_TAG, latest"
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "✅ Image pushed to dev ECR"

  load-artifact-and-push-prod:
    name: Load Artifact & Push to Prod ECR
    needs: [setup, build-and-save-artifact, deploy-dev]
    runs-on: ubuntu-latest
    environment: production-ecr

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image-${{ github.sha }}

      - name: Validate artifact exists
        run: |
          if [ ! -f backend-image.tar.gz ]; then
            echo "❌ Artifact not found for SHA: ${{ github.sha }}"
            echo "Please ensure dev build completed successfully"
            exit 1
          fi

          # Check tar is valid
          if ! tar -tzf backend-image.tar.gz > /dev/null 2>&1; then
            echo "❌ Corrupted artifact"
            exit 1
          fi

          SIZE=$(ls -lh backend-image.tar.gz | awk '{print $5}')
          echo "✅ Artifact validated (size: $SIZE)"

      - name: Load Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Loading image from artifact..."
          gunzip < backend-image.tar.gz | docker load
          docker image inspect backend-image:$IMAGE_TAG
          echo "✅ Image loaded: backend-image:$IMAGE_TAG"

      - name: Configure AWS credentials (prod)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to prod ECR
        id: login-prod-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push to prod ECR
        env:
          PROD_ECR: ${{ steps.login-prod-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Tagging image for prod ECR..."
          docker tag backend-image:$IMAGE_TAG $PROD_ECR/ait-prd-gbl-ecr-backend-01:$IMAGE_TAG
          docker tag backend-image:$IMAGE_TAG $PROD_ECR/ait-prd-gbl-ecr-backend-01:latest

          echo "Pushing image to prod ECR with tags: $IMAGE_TAG, latest"
          docker push $PROD_ECR/ait-prd-gbl-ecr-backend-01:$IMAGE_TAG
          docker push $PROD_ECR/ait-prd-gbl-ecr-backend-01:latest

          echo "✅ Image pushed to prod ECR"

  deploy-dev:
    name: Deploy to Dev
    needs: [setup, build-and-save-artifact]
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to ECS
        env:
          ECS_CLUSTER: ${{ needs.setup.outputs.dev_ecs_cluster }}
          ECS_SERVICE: ${{ needs.setup.outputs.dev_ecs_service }}
          IMAGE_TAG: ${{ needs.build-and-save-artifact.outputs.image_tag }}
        run: |
          echo "Deploying to dev ECS with image tag: $IMAGE_TAG"

          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --no-cli-pager

      - name: Wait for deployment
        env:
          ECS_CLUSTER: ${{ needs.setup.outputs.dev_ecs_cluster }}
          ECS_SERVICE: ${{ needs.setup.outputs.dev_ecs_service }}
        run: |
          echo "Waiting for ECS service to stabilize..."

          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --cli-read-timeout 300

      - name: Deployment summary
        if: success()
        env:
          BACKEND_URL: https://ait-dev-be.tratin.com
          IMAGE_TAG: ${{ needs.build-and-save-artifact.outputs.image_tag }}
        run: |
          echo "## Dev Deployment Complete! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** dev" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** $BACKEND_URL" >> $GITHUB_STEP_SUMMARY
          echo "**Image SHA:** $IMAGE_TAG" >> $GITHUB_STEP_SUMMARY

  deploy-prod:
    name: Deploy to Prod
    needs: [setup, load-artifact-and-push-prod]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials (prod)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get current task definition
        id: current-task
        env:
          ECS_CLUSTER: ${{ needs.setup.outputs.prod_ecs_cluster }}
          ECS_SERVICE: ${{ needs.setup.outputs.prod_ecs_service }}
        run: |
          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --query 'services[0].taskDefinition' \
            --output text)

          echo "current_task_arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT
          echo "Current task definition: $TASK_DEF_ARN"

      - name: Run database migrations
        env:
          ECS_CLUSTER: ${{ needs.setup.outputs.prod_ecs_cluster }}
          ECS_SERVICE: ${{ needs.setup.outputs.prod_ecs_service }}
          ECR_REPOSITORY: ${{ needs.setup.outputs.prod_ecr_repository }}
          IMAGE_TAG: ${{ needs.load-artifact-and-push-prod.outputs.image_tag }}
        run: |
          echo "Running database migrations..."

          ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID_PROD }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          SUBNETS=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.subnets' \
            --output json)

          SECURITY_GROUPS=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.securityGroups' \
            --output json)

          TASK_ARN=$(aws ecs run-task \
            --cluster $ECS_CLUSTER \
            --task-definition ${{ steps.current-task.outputs.current_task_arn }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=$SUBNETS,securityGroups=$SECURITY_GROUPS,assignPublicIp=DISABLED}" \
            --overrides '{
              "containerOverrides": [
                {
                  "name": "ait-prd-ue1-ecs-container-01",
                  "command": ["sh", "-c", "export DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT:-5432}/${DB_NAME:-ait_procurement} && npx prisma migrate deploy"]
                }
              ]
            }' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task ARN: $TASK_ARN"
          echo "Waiting for migrations to complete..."
          aws ecs wait tasks-stopped --cluster $ECS_CLUSTER --tasks $TASK_ARN

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster $ECS_CLUSTER \
            --tasks $TASK_ARN \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "❌ Migration failed with exit code: $EXIT_CODE"
            exit 1
          fi

          echo "✅ Migrations completed successfully"

      - name: Deploy to ECS
        env:
          ECS_CLUSTER: ${{ needs.setup.outputs.prod_ecs_cluster }}
          ECS_SERVICE: ${{ needs.setup.outputs.prod_ecs_service }}
          IMAGE_TAG: ${{ needs.load-artifact-and-push-prod.outputs.image_tag }}
        run: |
          echo "Deploying to prod ECS with image tag: $IMAGE_TAG"

          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --no-cli-pager

      - name: Wait for deployment
        env:
          ECS_CLUSTER: ${{ needs.setup.outputs.prod_ecs_cluster }}
          ECS_SERVICE: ${{ needs.setup.outputs.prod_ecs_service }}
        run: |
          echo "Waiting for ECS service to stabilize..."

          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --cli-read-timeout 600

      - name: Verify health check
        run: |
          echo "Verifying backend health..."

          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://ait-be.tratin.com/health || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed (HTTP $HTTP_CODE)"
              exit 0
            fi

            echo "⏳ Health check attempt $i/10 failed (HTTP $HTTP_CODE), retrying..."
            sleep 6
          done

          echo "❌ Health check failed after 10 attempts"
          exit 1

      - name: Monitor CloudWatch alarms
        run: |
          echo "Checking CloudWatch alarms for 5 minutes..."

          ALARM_NAMES=$(aws cloudwatch describe-alarms \
            --alarm-name-prefix "ait-prd-ue1-cw-alarm" \
            --query 'MetricAlarms[].AlarmName' \
            --output text)

          if [ -z "$ALARM_NAMES" ]; then
            echo "⚠️ No CloudWatch alarms found"
            exit 0
          fi

          echo "Monitoring alarms: $ALARM_NAMES"

          for i in {1..10}; do
            ALARM_STATES=$(aws cloudwatch describe-alarms \
              --alarm-names $ALARM_NAMES \
              --query 'MetricAlarms[?StateValue==`ALARM`].AlarmName' \
              --output text)

            if [ -n "$ALARM_STATES" ]; then
              echo "❌ Alarms in ALARM state: $ALARM_STATES"
              exit 1
            fi

            echo "✅ All alarms OK (check $i/10)"
            sleep 30
          done

          echo "✅ CloudWatch monitoring complete - no alarms triggered"

      - name: Deployment summary
        if: success()
        env:
          BACKEND_URL: https://ait-be.tratin.com
          IMAGE_TAG: ${{ needs.load-artifact-and-push-prod.outputs.image_tag }}
        run: |
          echo "## Prod Deployment Complete! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** prod" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** $BACKEND_URL" >> $GITHUB_STEP_SUMMARY
          echo "**Image SHA:** $IMAGE_TAG" >> $GITHUB_STEP_SUMMARY

  rollback:
    name: Rollback on Failure
    needs: [setup, deploy-prod]
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rollback to previous task definition
        env:
          ECS_CLUSTER: ${{ needs.setup.outputs.prod_ecs_cluster }}
          ECS_SERVICE: ${{ needs.setup.outputs.prod_ecs_service }}
        run: |
          echo "⚠️ Deployment failed, initiating rollback..."

          PREVIOUS_TASK_DEF=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --query 'services[0].deployments[1].taskDefinition' \
            --output text || echo "none")

          if [ "$PREVIOUS_TASK_DEF" = "none" ] || [ -z "$PREVIOUS_TASK_DEF" ]; then
            echo "❌ No previous task definition found for rollback"
            exit 1
          fi

          echo "Rolling back to: $PREVIOUS_TASK_DEF"

          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition $PREVIOUS_TASK_DEF \
            --force-new-deployment \
            --no-cli-pager

          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE

          echo "✅ Rollback complete"

      - name: Create rollback incident issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Production Deployment Failed - Rollback Initiated`,
              body: `## Deployment Failure\n\n**Workflow:** [${context.workflow}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n**Time:** ${new Date().toISOString()}\n\n### Action Required\n- Investigate deployment logs\n- Fix underlying issue\n- Re-run deployment when ready\n\n### Rollback Status\nAutomatic rollback to previous task definition has been initiated.`,
              labels: ['deployment', 'production', 'incident']
            });

            console.log(`Created incident issue: ${issue.data.html_url}`);
